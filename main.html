<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <form>
        <label for="name">Name</label>
        <input id="name" type="text" placeholder="Name">
        <br>

        <label for="phone">Phone Number</label>
        <input id="phone" type="text" placeholder="Phone Number">
        <br>

        <label for="address">Address</label>
        <input id="address" type="text" placeholder="Address">
        <br>

        <input
            id="checkbox"
            type="checkbox"
            value="Have you ever lived with a Dog before?"
        >
        <label for="checkbox">Have you ever lived with a Dog before?</label>
        <br>

        <label for="multiSelect">Please select your preferred breeds</label>
        <select id="multiSelect" multiple>
            <option value="labrador">Labrador</option>
            <option value="golden">Golden Retriever</option>
            <option value="beagle">Beagle</option>
            <option value="german">German Shepherd</option>
        </select>
        <br>

        <input id="submit" type="submit" value="Submit">
    </form>

    <script src="./script.js"></script>
</body>

</html>
